    IMPORTANT IMPLEMENTATION NOTE: A naive implementation that broadcasts the sequence-level ratio
    to all tokens will produce correct forward values but INCORRECT gradients. The test harness
    validates both values AND gradients via backpropagation. You must use the GSPO-token formulation
